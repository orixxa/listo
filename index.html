<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Listo - Shared List</title>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
:root {
  --bg1: #f8fafc; --bg2: #edf2f7; --bg3: #e2e8f0; --bg4: #e0f2fe;
  --card: #ffffff; --text: #1e293b; --itemBg: #f1f5f9;
  --doneBg: #dcfce7; --doneBorder: #bbf7d0; --doneText: #16a34a;
  --naBg: #fee2e2; --naBorder: #fecaca; --naText: #dc2626;
  --inputBg: #ffffff; --inputBorder: #cbd5e1;
}

html.dark, body.dark {
  --bg1: #0f172a; --bg2: #1e293b; --bg3: #0f172a; --bg4: #334155;
  --card: #1e293b; --text: #f8fafc; --itemBg: #0f172a;
  --doneBg: #064e3b; --doneBorder: #047857; --doneText: #4ade80;
  --naBg: #7f1d1d; --naBorder: #991b1b; --naText: #f87171;
  --inputBg: #1e293b; --inputBorder: #475569;
}

html { background-color: var(--bg1); transition: background-color 0.3s ease; }
body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4)); background-size: 400% 400%; animation: bg 8s ease-in-out infinite; z-index: -1; }
body { margin: 0; font-family: system-ui; display: flex; flex-direction: column; align-items: center; padding: 10px; box-sizing: border-box; min-height: 100vh; width: 100%; }
@keyframes bg { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.logo { width: 90px; height: auto; margin-top: 10px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
.container { max-width: 500px; width: 100%; margin-bottom: 20px; }
.card { background: var(--card); color: var(--text); padding: 15px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: all 0.3s ease; width: 100%; box-sizing: border-box; }
.header-top { position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; min-height: 45px; }
.stats-box { position: absolute; left: 0; display: flex; flex-direction: column; gap: 4px; text-align: left; }
.stat-row { display: flex; align-items: baseline; gap: 6px; }
.title-box { display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; }
.toggle-box { position: absolute; right: 0; display: flex; justify-content: flex-end; z-index: 3; }
.stat-lbl { margin: 0; font-size: 11px; color: #6366f1; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;}
.stat-val { margin: 0; font-size: 12px; font-weight: 800; color: var(--text); transition: color 0.3s; }
.title { margin: 0; font-size: 18px; font-weight: bold; color: var(--text); transition: color 0.3s; white-space: nowrap; }
.live-indicator { display: flex; align-items: center; gap: 5px; margin-top: 4px; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #ef4444; background: #fee2e2; padding: 3px 8px; border-radius: 12px; }
.live-dot { width: 6px; height: 6px; background: #ef4444; border-radius: 50%; animation: pulse 1s infinite; }
body.dark .live-indicator { background: #7f1d1d; color: #fca5a5; }
body.dark .live-dot { background: #fca5a5; }
@keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(0.9); opacity: 1; } }
.toggle-btn { background: var(--inputBg); border: 1px solid var(--inputBorder); border-radius: 50%; width: 38px; height: 38px; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; color: var(--text); transition: 0.3s; }
.cat-badge { text-align: center; font-size: 13px; font-weight: 600; color: #6366f1; background: #eef2ff; padding: 4px 15px; border-radius: 20px; width: fit-content; margin: 0 auto 15px; display: none; }
body.dark .cat-badge { background: #312e81; color: #a5b4fc; }
.item-card { background: var(--itemBg); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--bg3); width: 100%; box-sizing: border-box; transition: all 0.3s ease; }
.item-card.done { background: var(--doneBg); border-color: var(--doneBorder); }
.item-card.na { background: var(--naBg); border-color: var(--naBorder); }
.item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.item-text { font-size: 16px; font-weight: bold; color: var(--text); transition: color 0.3s; flex: 1; text-align: left; padding-right: 10px; font-style: normal; }
.qty-text { color: #6366f1; font-weight: 800; font-size: 14px; margin-left: 4px; }
body.dark .qty-text { color: #a5b4fc; }
.status-wrap { display: flex; align-items: center; gap: 12px; }
.status-label { font-size: 11px; font-weight: bold; text-transform: uppercase; }
.status-label.done { color: var(--doneText); }
.status-label.na { color: var(--naText); }
.action-icons { display: flex; align-items: center; gap: 4px; }
.edit-icon { color: #3b82f6; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; padding: 5px; border-radius: 50%; }
.edit-icon:active { transform: scale(0.8); background: rgba(0,0,0,0.05); }
.edit-icon svg { width: 18px; height: 18px; }
.delete-icon { color: #94a3b8; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; padding: 5px; border-radius: 50%; }
.delete-icon:active { transform: scale(0.8); background: rgba(0,0,0,0.05); }
.delete-icon svg { width: 18px; height: 18px; }
.price-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--inputBorder); background: var(--inputBg); color: var(--text); margin-bottom: 8px; box-sizing: border-box; outline: none; font-size: 14px; transition: all 0.3s ease; }
.row { display: flex; gap: 10px; }
.btn { flex: 1; padding: 10px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.1s; font-size: 13px; }
.btn:active { transform: scale(0.95); }
.btn-avail { background: #22c55e; }
.btn-na { background: #ef4444; }
.tagline { text-align: center; font-size: 13px; color: #16a34a; font-weight: 600; font-style: italic; margin-top: 15px; }
body.dark .tagline { color: #4ade80; }
</style>
</head>

<body>

<img src="https://image2url.com/r2/default/images/1774860458918-c6f7a05c-ca26-46e6-96fc-a7648f576bb0.png" class="logo">

<div class="container">
  <div class="card">
    <div class="header-top">
      <div class="stats-box">
        <div class="stat-row"><span class="stat-lbl">Items:</span><span id="itemCountDisplay" class="stat-val">0</span></div>
        <div class="stat-row"><span class="stat-lbl">Spent:</span><span id="totalDisplay" class="stat-val">₹0</span></div>
      </div>
      <div class="title-box">
        <h2 class="title" id="mainTitle">Shared List</h2>
        <div class="live-indicator" id="liveTag" style="display:none;"><span class="live-dot"></span> Live</div>
      </div>
      <div class="toggle-box"><button id="themeToggle" class="toggle-btn" onclick="toggleTheme()">🌙</button></div>
    </div>
    <div id="catName" class="cat-badge"></div>
    <div id="list" style="padding-bottom: 10px;">
      <div style="text-align:center; color:#94a3b8; font-style:italic; padding:20px;">Connecting Sync...</div>
    </div>
  </div>
  <p class="tagline">Listo apnaiye: List banegi digital, shopping hogi simple!</p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6LVzU-sATwv6mnTShovOcwi9MbhvlXrY",
  authDomain: "listo-356ba.firebaseapp.com",
  projectId: "listo-356ba",
  storageBucket: "listo-356ba.firebasestorage.app",
  appId: "1:104729909475:web:fb3bd44800d371b7748dd6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const uid = params.get("uid");
const ocn = params.get("ocn");      
const dc = params.get("dc");        
const appTheme = params.get("theme");

let globalItems = [];
let currentCategory = ocn || ""; 
let syncTimeout;

function toggleTheme(){
  document.documentElement.classList.toggle("dark");
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark);
  document.getElementById("themeToggle").innerText = isDark ? "☀️" : "🌙";
}

if(appTheme === "dark" || localStorage.getItem("theme") === "true") {
    document.documentElement.classList.add("dark");
    document.body.classList.add("dark");
    document.getElementById("themeToggle").innerText = "☀️";
}

if(dc) {
    document.getElementById("catName").innerText = decodeURIComponent(dc);
    document.getElementById("catName").style.display = "block";
}

if(uid){
  document.getElementById("liveTag").style.display = "flex";
  db.collection("users").doc(uid).onSnapshot(doc => {
    if(doc.exists){
      if (doc.metadata.hasPendingWrites) return;
      const dataObj = doc.data();
      
      let newItems = [];
      if(currentCategory === "All Items") {
          (dataObj.items || []).forEach(it => newItems.push({...it, _cat: 'root'}));
          if(dataObj.categories) {
              Object.keys(dataObj.categories).forEach(catKey => {
                  (dataObj.categories[catKey].items || []).forEach(it => newItems.push({...it, _cat: catKey}));
              });
          }
      } 
      else if (currentCategory && currentCategory !== "root" && currentCategory !== "Show Item") {
          newItems = (dataObj.categories && dataObj.categories[currentCategory]) ? 
            (dataObj.categories[currentCategory].items || []).map(it => ({...it, _cat: currentCategory})) : [];
      } else {
          newItems = (dataObj.items || []).map(it => ({...it, _cat: 'root'}));
      }
      
      globalItems = newItems;
      renderUI();
    }
  }, err => console.error("Firestore Error:", err));
}

function updateTotalDisplay() {
  let total = 0;
  globalItems.forEach(it => {
    if(it.status === "done") total += Number(it.price || 0);
  });
  document.getElementById("totalDisplay").innerText = "₹" + total;
}

function renderUI(){
  const listDiv = document.getElementById("list");
  
  // Save focus state before re-rendering
  const activeEl = document.activeElement;
  const activeIdx = (activeEl && activeEl.classList.contains('price-input')) ? 
                    Array.from(document.querySelectorAll('.price-input')).indexOf(activeEl) : -1;

  listDiv.innerHTML = "";
  document.getElementById("itemCountDisplay").innerText = globalItems.length;

  if(globalItems.length === 0){
      listDiv.innerHTML = "<div style='text-align:center; color:#94a3b8; padding:20px; font-style:italic;'>List is empty</div>";
      document.getElementById("totalDisplay").innerText = "₹0";
      return;
  }

  globalItems.forEach((it, i) => {
    const div = document.createElement("div");
    div.className = "item-card " + it.status;
    const editIcon = `<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
    const trashIcon = `<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;
    div.innerHTML = `
      <div class="item-header">
        <span class="item-text">${i+1}. ${it.name} ${it.q ? `<span class="qty-text">(${it.q})</span>` : ""}</span>
        <div class="status-wrap">
            ${it.status !== 'pending' ? `<span class="status-label ${it.status}">${it.status === 'done' ? 'Available' : 'N/A'}</span>` : ''}
            <div class="action-icons">
                <span class="edit-icon" onclick="editItem(${i})">${editIcon}</span>
                <span class="delete-icon" onclick="deleteItem(${i})">${trashIcon}</span>
            </div>
        </div>
      </div>
      <input type="number" class="price-input" placeholder="Price ₹" value="${it.price || ''}" oninput="updatePrice(${i}, this.value)">
      ${it.status === "pending" ? `
        <div class="row">
          <button class="btn btn-avail" onclick="updateStatus(${i}, 'done')">Available</button>
          <button class="btn btn-na" onclick="updateStatus(${i}, 'na')">N/A</button>
        </div>` : ''}
    `;
    listDiv.appendChild(div);
  });
  updateTotalDisplay();

  // Restore focus if needed
  if (activeIdx !== -1) {
    const inputs = document.querySelectorAll('.price-input');
    if (inputs[activeIdx]) inputs[activeIdx].focus();
  }
}

window.editItem = function(i) {
  let newQty = prompt("Update Qty:", globalItems[i].q || "");
  if (newQty !== null) { globalItems[i].q = newQty; renderUI(); scheduleSync(globalItems[i]); }
}
window.deleteItem = function(i) {
  if (confirm("Delete?")) { let item = globalItems.splice(i, 1)[0]; renderUI(); scheduleSync(item); }
}
window.updatePrice = function(i, val){
  globalItems[i].price = val;
  updateTotalDisplay(); // Total update karein bina re-render kiye
  scheduleSync(globalItems[i]);
}
window.updateStatus = function(i, stat){
  globalItems[i].status = stat;
  renderUI(); scheduleSync(globalItems[i]);
}

function scheduleSync(targetItem){
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => {
    if(!uid) return;
    const ref = db.collection("users").doc(uid);
    
    if (currentCategory === "All Items") {
        const cat = targetItem._cat;
        const catItems = globalItems.filter(it => it._cat === cat).map(it => ({ name: it.name, q: it.q||"", price: it.price||"", status: it.status }));
        if (cat === 'root') ref.update({ items: catItems });
        else ref.update({ [`categories.${cat}.items`]: catItems });
    } else {
        const cleanData = globalItems.map(it => ({ name: it.name, q: it.q||"", price: it.price||"", status: it.status }));
        if (currentCategory === "" || currentCategory === "root" || currentCategory === "Show Item") ref.update({ items: cleanData });
        else ref.update({ [`categories.${currentCategory}.items`]: cleanData });
    }
  }, 1000); // 1 second buffer for typing
}
</script>
</body>
</html>
