<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listo - Shared List</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #673AB7; --bg: #f5f5f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 500.px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; }
        .header p { color: #666; margin: 5px 0; }
        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; transition: 0.3s; }
        .item:last-child { border-bottom: none; }
        .item.done { opacity: 0.6; }
        .item.done span { text-decoration: line-through; color: #888; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 15px; cursor: pointer; accent-color: var(--primary); }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 17px; display: block; }
        .item-qty { font-size: 13px; color: #888; }
        #loading { text-align: center; padding: 40px; color: var(--primary); font-weight: bold; }
        .error { color: red; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">Connecting to Listo Sync...</div>
        <div id="content" style="display:none;">
            <div class="header">
                <h1 id="list-title">Shared List</h1>
                <p id="owner-name"></p>
                <div id="budget-info" style="font-size: 14px; color: #444; font-weight: bold;"></div>
            </div>
            <div id="items-list"></div>
        </div>
    </div>

    <script>
        // 1. Firebase Configuration (Matches your app)
        const firebaseConfig = {
            apiKey: "AIzaSyC6LVzU-sATwv6mnTShovOcwi9MbhvlXrY",
            authDomain: "listo-356ba.firebaseapp.com",
            projectId: "listo-356ba",
            storageBucket: "listo-356ba.appspot.com",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Parse URL Parameters
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('uid');
        const ocn = params.get('ocn'); // Original Category Name
        const sn = params.get('sn') || 'User'; // Sender Name
        const dc = params.get('dc') || ocn; // Display Category

        if (!uid) {
            document.getElementById('loading').innerHTML = '<div class="error">Invalid Link: No UID found.</div>';
        } else {
            document.getElementById('owner-name').innerText = "Shared by " + sn;
            document.getElementById('list-title').innerText = dc;
            
            // 3. Listen to Firestore in Real-time
            const docRef = db.collection('users').document(uid);
            
            docRef.onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    let items = [];
                    let budget = "0";

                    // Check if it's Root (Show Item) or a specific category
                    if (ocn === "Show Item" || !ocn || ocn === "") {
                        items = data.items || [];
                        budget = data.budget || "0";
                    } else {
                        const catData = data.categories ? data.categories[ocn] : null;
                        if (catData) {
                            items = catData.items || [];
                            budget = catData.budget || "0";
                        }
                    }

                    renderItems(items, budget);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    document.getElementById('loading').innerHTML = '<div class="error">List not found in Database.</div>';
                }
            }, (error) => {
                console.error("Sync Error:", error);
                document.getElementById('loading').innerHTML = '<div class="error">Sync Error: Check permissions.</div>';
            });

            // 4. Render Items Function
            function renderItems(items, budget) {
                const listDiv = document.getElementById('items-list');
                const budgetDiv = document.getElementById('budget-info');
                
                let spent = 0;
                items.forEach(it => { if(it.status === 'done') spent += parseFloat(it.price || 0); });
                budgetDiv.innerText = `Budget: ₹${budget} | Spent: ₹${spent}`;

                listDiv.innerHTML = '';
                items.forEach((item, index) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = `item ${item.status === 'done' ? 'done' : ''}`;
                    
                    itemDiv.innerHTML = `
                        <input type="checkbox" ${item.status === 'done' ? 'checked' : ''} onchange="toggleItem(${index})">
                        <div class="item-info">
                            <span class="item-name">${item.name}</span>
                            <span class="item-qty">${item.q || ''} ${item.price ? ' • ₹'+item.price : ''}</span>
                        </div>
                    `;
                    listDiv.appendChild(itemDiv);
                });
                
                // Save globally for toggle function
                window.currentItems = items;
            }

            // 5. Update Firestore (Write back to App)
            window.toggleItem = function(index) {
                const items = [...window.currentItems];
                const newStatus = items[index].status === 'done' ? 'pending' : 'done';
                items[index].status = newStatus;

                const updateData = {};
                if (ocn === "Show Item" || !ocn || ocn === "") {
                    updateData["items"] = items;
                } else {
                    updateData[`categories.${ocn}.items`] = items;
                }

                db.collection('users').document(uid).update(updateData)
                .then(() => console.log("Sync Success!"))
                .catch(err => alert("Update Failed: " + err.message));
            };
        }
    </script>
</body>
</html>
